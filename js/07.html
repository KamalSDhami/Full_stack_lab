<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="h1">Updating page</h1>
    <h1 id="h2">Updating page</h1>
    <script>

            function change(){
                document.getElementById("h2").innerHTML += "<br>hello ";

            }
            setInterval(change,2000);
            function time(){
                var now = new Date();
                document.getElementById("h1").innerHTML = "page updated at "+ now.toLocaleTimeString();

            }
            
            setInterval(time,1000);
    </script>
</body>
</html>
