<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form onsubmit="return validate()" method="get" >
        <legend>Basic Info</legend>
        <label for="name">Name</label>
        <input type="text" id="name">
        <br>
        <label for="email">Email</label> <!-- / ^[A-Za-z0-9._#+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$-->
        <input type="email" id="email">
        <br>
        <label for="password">Password</label>
        <input type="password" name="password" id="password">
        <br>
        <input type="submit">
        <input type="reset">
        
        <script>
            function validate(){
                let name = document.getElementById("name").value;
                let mail= document.getElementById("email").value
                let password=document.getElementById("password").value;
                
                let name_reg=/^[A-Za-z]+( [A-Za-z]+)*$/; //^[A-Z][A-Za-z]+( [A-Z][A-Za-z]+)*$
                let mail_reg=/^[A-Za-z0-9._#+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
                let Pass_reg = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
                let check=""
                
                if(!name_reg.test(name)){
                    check=check+ "Invalid Name";
                }
                if(!Pass_reg.test(password)){
                    check= check+ "Invalid Password";
                }
                if(!mail_reg.test(mail)){
                    check= check+"Invalid Email"
                }
                if(check!=""){
                    alert(check);
                }else{
                    alert("valid")
                }
            }
            </script>
        </form>
</body>
</html>
